<header class="site-header">
  <div class="wrapper">
    <a class="home-link" href="{{ "/" | prepend: site.baseurl }}">{{ site.title }}</a>
    <nav class="page-links">
      {% for my_page in site.pages %}
        {% if my_page.title %}
          <a class="page-link" href="{{ my_page.url | prepend: site.baseurl }}">{{ my_page.title }}</a>
        {% endif %}
      {% endfor %}
    </nav>
  </div>
</header>
